<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemo Medication Manager</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="header-container">
            <h1>Chemo Medication Manager</h1>
        </div>
    </header>

    <main class="container">

        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="card mb-20">
                <h3>📂 Load Data</h3>
                <p class="text-sm text-gray mb-10">Select your
                    <code>chemoMedications.json</code> file.
                </p>
                <input type="file" id="jsonFileInput" accept=".json" class="form-control text-xs">
            </div>

            <div class="card opacity-50 pointer-events-none" id="navCard">
                <h3>Categories</h3>
                <ul id="categoryList">

                </ul>
            </div>

            <div class="card mt-20">
                <button class="btn btn-success" id="downloadBtn" disabled>💾 Download JSON</button>
                <p class="save-status" id="saveStatus"></p>
                <p class="text-xs text-gray mt-5">
                    Saves <code>updated_chemoMedications.json</code> to your downloads.
                </p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <section class="content">
            <div id="welcomeView">
                <div class="card empty-state">
                    <h2>Welcome</h2>
                    <p>Please load a valid JSON file to manage chemotherapy medications.</p>
                </div>
            </div>

            <div id="categoryView" hidden>
                <div class="view-header">
                    <h2 id="currentCategoryTitle">Category</h2>
                    <div>
                        <button class="btn btn-primary" id="addDrugBtn">+ Add Drug</button>
                    </div>
                </div>

                <div class="category-block">
                    <p id="currentCategoryDesc" class="category-description"></p>
                    <div id="drugsContainer">
                        <!-- Drugs loaded here -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Drug Edit Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Edit Drug</h3>
            <div id="modalBody">
                <div class="form-group">
                    <label>Drug Name</label>
                    <input type="text" id="editName" class="form-control">
                </div>

                <div class="form-group">
                    <label>Extravasation Risk</label>
                    <select id="editRisk" class="form-control">
                        <option value="Non-vesicant">Non-vesicant</option>
                        <option value="Irritant">Irritant</option>
                        <option value="Vesicant">Vesicant</option>
                        <option value="N/A Oral">N/A Oral</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Monitoring Frequency</label>
                    <textarea id="editMonitoring" class="form-control" placeholder="Continuous observation during administration"></textarea>
                </div>

                <div class="form-group">
                    <label>Premedications (One per line)</label>
                    <textarea id="editPremeds" class="form-control" placeholder="Acetaminophen (PO)"></textarea>
                </div>

                <div class="form-group">
                    <label>Fatal Alerts</label>
                    <textarea id="editFatalAlerts" class="form-control" placeholder="NEVER INTRATHECAL. Must be dispensed in a minibag."></textarea>
                </div>

                <div class="form-group">
                    <label>Mandatory Checks (One per line)</label>
                    <textarea id="editMandatoryChecks" class="form-control"
                        placeholder="Verify patient ID\nConfirm IV patency (Vesicant)"></textarea>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Extravasation Action</label>
                        <input type="text" id="editExtravasationAction" class="form-control"
                            placeholder="Stop infusion immediately...">
                    </div>
                    <div class="form-group">
                        <label>Extravasation Antidote</label>
                        <input type="text" id="editExtravasationAntidote" class="form-control"
                            placeholder="Hyaluronidase">
                    </div>
                </div>

                <div class="form-group">
                    <label>Stop Criteria (One per line)</label>
                    <textarea id="editStopCriteria" class="form-control"
                        placeholder="Patient complains of burning/pain at site\nSigns of redness or swelling"></textarea>
                </div>

                <div class="form-group">
                    <label>Report to Physician (One per line)</label>
                    <textarea id="editReportToPhysician" class="form-control"
                        placeholder="Paralytic ileus\nNew onset foot drop"></textarea>
                </div>

                <div class="form-group">
                    <label>Manage at Bedside (One per line)</label>
                    <textarea id="editManageAtBedside" class="form-control"
                        placeholder="Mild constipation\nDry skin"></textarea>
                </div>

                <div class="form-group">
                    <label>Post-Infusion Assessment (One per line)</label>
                    <textarea id="editPostInfusionAssessment" class="form-control"
                        placeholder="Check for delayed hypersensitivity\nAssess for peripheral neuropathy"></textarea>
                </div>

                <div class="form-group">
                    <label>Patient Education</label>
                    <textarea id="editPatientEducation" class="form-control"
                        placeholder="Report signs of infection\nAvoid NSAIDs"></textarea>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Evidence Source</label>
                        <input type="text" id="editSource" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Last Updated</label>
                        <input type="date" id="editLastUpdated" class="form-control">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="closeModalBtn">Cancel</button>
                <button class="btn btn-primary" id="saveModalBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="appMedicatioons.js"></script>
    <footer class="portal-footer">
        © Hema Nurse Aid Project 2025
    </footer>
</body>

</html>
